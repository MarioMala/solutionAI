<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie - System Zarządzania Rozwiązaniami</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }
        .login-title {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        .login-title h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        .login-title p {
            color: #666;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-login:hover {
            background: #5568d3;
        }
        .btn-login:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .error-message {
            background: #ff4444;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }
        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        .register-link a {
            color: #667eea;
            text-decoration: none;
        }
        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-title">
                <h1>System Zarządzania Rozwiązaniami</h1>
                <p>Zaloguj się, aby kontynuować</p>
            </div>
            <div id="error-message" class="error-message"></div>
            <form id="login-form">
                <div class="form-group">
                    <label for="mail">Email:</label>
                    <input type="email" id="mail" name="mail" required placeholder="Wprowadź email">
                </div>
                <div class="form-group">
                    <label for="password">Hasło:</label>
                    <input type="password" id="password" name="password" required placeholder="Wprowadź hasło">
                </div>
                <button type="submit" class="btn-login" id="login-btn">Zaloguj</button>
            </form>
            <div class="register-link">
                Nowe konto może utworzyć tylko administrator systemu.
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin + '/api';

        // Sprawdzenie czy użytkownik jest już zalogowany
        async function checkAuth() {
            try {
                const response = await fetch(API_URL + '/auth/status', { credentials: 'include' });
                const data = await response.json();
                if (data.isAuthenticated) {
                    window.location.href = 'index.html';
                }
            } catch (error) {
                console.error('Błąd sprawdzania autoryzacji:', error);
            }
        }

        // Obsługa logowania
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const mail = document.getElementById('mail').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-message');
            const loginBtn = document.getElementById('login-btn');

            loginBtn.disabled = true;
            loginBtn.textContent = 'Logowanie...';
            errorDiv.style.display = 'none';

            try {
                const response = await fetch(API_URL + '/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mail, password }),
                    credentials: 'include'
                });

                const data = await response.json();

                if (response.ok) {
                    window.location.href = 'index.html';
                } else {
                    errorDiv.textContent = data.error || 'Błąd logowania';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = 'Błąd połączenia z serwerem';
                errorDiv.style.display = 'block';
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Zaloguj';
            }
        });

        // Sprawdź status autoryzacji przy załadowaniu
        checkAuth();
    </script>
</body>
</html>
